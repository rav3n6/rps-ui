<mat-card appearance="outlined" class="move-card">
  <mat-card-header>
    <mat-card-title>Choose your move</mat-card-title>
    <mat-card-subtitle>
      Select rock, paper, or scissors
    </mat-card-subtitle>
  </mat-card-header>

  <mat-card-content>
    <div
      class="move-grid"
      role="group"
      aria-label="Choose your move"
    >
      <button
        mat-flat-button
        type="button"
        class="move-button"
        aria-label="Choose rock"
        (click)="selectMove('ROCK')"
      >
        <span class="move-button-content">
          <mat-icon
            fontSet="material-symbols-outlined"
            aria-hidden="true"
          >
            landscape
          </mat-icon>

          <span>Rock</span>
        </span>
      </button>

      <button
        mat-flat-button
        type="button"
        class="move-button"
        aria-label="Choose paper"
        (click)="selectMove('PAPER')"
        >
        <span class="move-button-content">
          <mat-icon
            fontSet="material-symbols-outlined"
            aria-hidden="true"
          >
            front_hand
          </mat-icon>

          <span>Paper</span>
        </span>
      </button>

        <button
            mat-flat-button
            type="button"
            class="move-button"
            aria-label="Choose scissors"
            (click)="selectMove('SCISSORS')"
        >
        <span class="move-button-content">
          <mat-icon
            fontSet="material-symbols-outlined"
            aria-hidden="true"
          >
            content_cut
          </mat-icon>

          <span>Scissors</span>
        </span>
      </button>
    </div>
  </mat-card-content>
</mat-card>
