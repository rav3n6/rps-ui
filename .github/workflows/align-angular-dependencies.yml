name: Align Angular dependencies

on:
  push:
    paths:
      - '.github/workflows/align-angular-dependencies.yml'

permissions:
  contents: write

jobs:
  align-dependencies:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Align Angular Material and CDK
        run: npm install @angular/material@21.2.4 @angular/cdk@21.2.4 --save

      - name: Commit regenerated dependency files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          if ! git diff --cached --quiet; then
            git commit -m "fix: align Angular Material dependencies"
            git push
          fi
